version: 2
updates:
  # GitHub Actions — keeps SHA pins current when new versions release
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"

  # Terraform providers — tracks azurerm, azapi, random version constraints
  - package-ecosystem: terraform
    directory: /terraform
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "terraform"
