name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~1.7"

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~1.7"

      - name: terraform init (no backend)
        run: terraform init -backend=false
        working-directory: terraform

      - name: terraform validate
        run: terraform validate
        working-directory: terraform

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: "."
          severity: warning
          ignore_paths: ".terraform"

  manifests:
    name: Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install kubeconform
        env:
          # SHA256 of kubeconform-linux-amd64.tar.gz for v0.6.7
          # Verify at: https://github.com/yannh/kubeconform/releases/tag/v0.6.7
          KUBECONFORM_VERSION: "v0.6.7"
          KUBECONFORM_SHA256: "95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73"
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            -o kubeconform.tar.gz
          echo "${KUBECONFORM_SHA256}  kubeconform.tar.gz" | sha256sum -c -
          tar -xz -C /usr/local/bin -f kubeconform.tar.gz
          rm kubeconform.tar.gz

      - name: Validate Kubernetes manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            manifests/**/*.yaml
