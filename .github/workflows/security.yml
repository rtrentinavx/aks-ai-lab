name: Security Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly on Monday at 06:00 UTC

jobs:
  checkov:
    name: Checkov (Terraform + Manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Checkov
        run: pip install checkov --quiet

      - name: Run Checkov
        run: |
          checkov \
            --directory . \
            --framework terraform kubernetes \
            --output cli \
            --skip-check \
              CKV_AZURE_7,CKV_AZURE_141,\
              CKV_K8S_14,\
              CKV_K8S_15,\
              CKV_K8S_16,\
              CKV_K8S_20,\
              CKV_K8S_22,\
              CKV_K8S_23,\
              CKV_K8S_28,\
              CKV_K8S_35,\
              CKV_K8S_37,\
              CKV_K8S_38,\
              CKV_K8S_40,\
              CKV_K8S_43 \
            --quiet
          # Skipped K8S checks (GPU/inference requirements or lab trade-offs):
          # CKV_K8S_14/15 - ollama:latest tag; acceptable for lab
          # CKV_K8S_16    - privileged: true required by DCGM for GPU hardware access
          # CKV_K8S_20    - allowPrivilegeEscalation: incompatible with privileged:true on DCGM
          # CKV_K8S_22    - readOnlyRootFilesystem: GPU containers (vLLM, Ollama) require writable FS
          # CKV_K8S_23    - root containers: vLLM (CUDA), Ollama, DCGM require root
          # CKV_K8S_28/37 - NET_RAW/capabilities: GPU workload requirements
          # CKV_K8S_35    - some runtime config passed via env vars (non-secret values)
          # CKV_K8S_38    - SA token automount required for Workload Identity token injection
          # CKV_K8S_40    - high UID: GPU workloads require specific UIDs for device access
          # CKV_K8S_43    - image digest: lab uses mutable tags for flexibility

  trivy:
    name: Trivy (Secret + Misconfiguration scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
          trivyignores: .trivyignore
