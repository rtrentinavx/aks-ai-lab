###############################################################################
# SecretProviderClass — Azure Key Vault CSI Driver
#
# HOW IT WORKS:
# The Secrets Store CSI Driver mounts Key Vault secrets as files inside pods.
# Combined with Workload Identity, there are zero stored credentials anywhere
# in the cluster — the OIDC token from the ServiceAccount is exchanged for a
# short-lived AAD token at mount time.
#
# Secrets are re-synced on rotation (configured in Terraform: secret_rotation_enabled = true)
# Optionally, secrets can also be mirrored as Kubernetes Secret objects (for
# env vars in legacy workloads that can't read from files).
#
# COMMON USE CASES IN THIS LAB:
#   - HuggingFace token (for gated models like Llama 3)
#   - Azure AI Foundry API key
#   - Service Bus connection string (fallback if not using Workload Identity)
###############################################################################
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: lab-secrets
  namespace: inference
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "<WORKLOAD_IDENTITY_CLIENT_ID>"   # Same as ServiceAccount annotation
    keyvaultName: "<KEY_VAULT_NAME>"            # From: terraform output key_vault_uri
    tenantID: "<AZURE_TENANT_ID>"
    objects: |
      array:
        - |
          objectName: hf-token          # Secret name in Key Vault
          objectType: secret
          objectAlias: HF_TOKEN         # File name under /mnt/secrets/
        - |
          objectName: foundry-api-key
          objectType: secret
          objectAlias: FOUNDRY_API_KEY
        - |
          objectName: servicebus-conn
          objectType: secret
          objectAlias: SERVICEBUS_CONN

  # Mirror as Kubernetes Secret so pods can use envFrom
  secretObjects:
    - secretName: lab-secrets-k8s
      type: Opaque
      data:
        - objectName: HF_TOKEN
          key: hf-token
        - objectName: FOUNDRY_API_KEY
          key: foundry-api-key
        - objectName: SERVICEBUS_CONN
          key: servicebus-conn
