###############################################################################
# Workload Identity — Kubernetes ServiceAccount
#
# HOW IT WORKS:
# AKS issues a short-lived OIDC token for this ServiceAccount. The Azure
# Workload Identity webhook intercepts pods that reference this SA and injects
# three environment variables:
#   AZURE_CLIENT_ID          — the managed identity's client ID
#   AZURE_TENANT_ID          — your AAD tenant
#   AZURE_FEDERATED_TOKEN_FILE — path to the projected OIDC token
#
# Any Azure SDK call using DefaultAzureCredential automatically picks these
# up — no secrets, no client certs, no rotation required.
#
# The link between this SA and the Azure managed identity is the Federated
# Credential created in Terraform:
#   subject = "system:serviceaccount:inference:inference-sa"
###############################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inference-sa
  namespace: inference
  annotations:
    # Replace with the client ID from: terraform output workload_identity_client_id
    azure.workload.identity/client-id: "<WORKLOAD_IDENTITY_CLIENT_ID>"
    azure.workload.identity/tenant-id: "<AZURE_TENANT_ID>"
  labels:
    azure.workload.identity/use: "true"
