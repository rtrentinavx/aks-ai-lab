###############################################################################
# Mock Inference Server — CPU-only, for testing routing/scaling plumbing
#
# Responds to POST /v1/chat/completions with a static OpenAI-format response.
# Use this instead of KAITO/vLLM when GPU nodes are not available.
#
# Deploy: kubectl apply -f manifests/vllm/mock-inference.yaml
# Remove: kubectl delete -f manifests/vllm/mock-inference.yaml
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-inference
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-inference
  template:
    metadata:
      labels:
        app: mock-inference
    spec:
      containers:
        - name: mock
          image: python:3.12-slim
          ports:
            - containerPort: 5000
          command:
            - python
            - -c
            - |
              import json, time
              from http.server import BaseHTTPRequestHandler, HTTPServer

              class Handler(BaseHTTPRequestHandler):
                  def log_message(self, fmt, *args):
                      pass  # suppress access logs

                  def do_GET(self):
                      if self.path == "/health":
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"ok")
                      else:
                          self.send_response(404)
                          self.end_headers()

                  def do_POST(self):
                      length = int(self.headers.get("Content-Length", 0))
                      body = json.loads(self.rfile.read(length) or b"{}")
                      model = body.get("model", "mock-model")
                      prompt = (body.get("messages") or [{}])[-1].get("content", "")
                      resp = {
                          "id": "mock-chatcmpl-0001",
                          "object": "chat.completion",
                          "created": int(time.time()),
                          "model": model,
                          "choices": [{
                              "index": 0,
                              "message": {
                                  "role": "assistant",
                                  "content": f"[mock] You said: {prompt}"
                              },
                              "finish_reason": "stop"
                          }],
                          "usage": {"prompt_tokens": 10, "completion_tokens": 10, "total_tokens": 20}
                      }
                      payload = json.dumps(resp).encode()
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", len(payload))
                      self.end_headers()
                      self.wfile.write(payload)

              HTTPServer(("0.0.0.0", 5000), Handler).serve_forever()
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mock-inference
  namespace: inference
spec:
  selector:
    app: mock-inference
  ports:
    - port: 5000
      targetPort: 5000
---
# HTTPRoute wiring mock-inference into the Envoy Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mock-inference-route
  namespace: inference
spec:
  parentRefs:
    - name: inference-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: mock-inference
          port: 5000
