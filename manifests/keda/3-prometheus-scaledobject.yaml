###############################################################################
# KEDA Trigger 3 — Azure Managed Prometheus (GPU Utilization / vLLM queue)
#
# WHAT THIS SOLVES:
# HTTP and queue triggers react to *arriving work*. Prometheus triggers react
# to *system state* — GPU utilization, vLLM internal queue depth, KV-cache
# pressure. This lets you scale based on "the GPU is saturated" rather than
# "more requests arrived."
#
# TWO PROMETHEUS QUERIES SHOWN:
#
#   A) GPU Utilization (DCGM metric)
#      Source: NVIDIA DCGM exporter → Azure Managed Prometheus
#      Logic:  If avg GPU util > 70% across replicas → add more replicas
#      Use:    Scale the number of vLLM pods (each gets its own GPU)
#
#   B) vLLM Queue Depth (vLLM native metric)
#      Source: vLLM /metrics endpoint → Prometheus scrape
#      Logic:  If avg pending requests > 5 per replica → add replicas
#      Use:    More directly tied to inference latency SLOs
#
# REQUIRED SETUP:
#   1. NVIDIA DCGM Exporter deployed (see manifests/monitoring/)
#   2. Azure Managed Prometheus enabled on the cluster (Terraform does this)
#   3. KEDA identity has "Monitoring Data Reader" role on the AMW (Terraform)
#   4. Prometheus scrape config includes vLLM pods
#
# GET YOUR PROMETHEUS ENDPOINT:
#   az monitor account show \
#     --name aks-ai-lab-amw \
#     --resource-group rg-aks-ai-lab \
#     --query "metrics.prometheusQueryEndpoint" -o tsv
###############################################################################

# --- ScaledObject: GPU Utilization ---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inference-gpu-scaler
  namespace: inference
spec:
  scaleTargetRef:
    name: workspace-phi4-mini     # KAITO-managed Deployment

  pollingInterval: 30             # Check every 30s (GPU metrics lag ~15s anyway)
  cooldownPeriod: 180             # 3 min cooldown — GPU scale-down should be gradual
  minReplicaCount: 1              # Keep 1 warm replica for GPU workloads
  maxReplicaCount: 4              # Bounded by GPU node quota

  triggers:
    - type: prometheus
      metadata:
        # Replace with your Azure Managed Prometheus query endpoint
        serverAddress: "https://<AMW_ENDPOINT>.prometheus.monitor.azure.com"

        # DCGM_FI_DEV_GPU_UTIL = 0-100 GPU compute utilization per device
        # avg() across all GPUs in the inference deployment
        query: |
          avg(
            DCGM_FI_DEV_GPU_UTIL{
              namespace="inference",
              pod=~"workspace-phi4-mini.*"
            }
          )
        metricName: gpu_utilization_inference

        # Scale up when avg GPU utilization > 70%
        threshold: "70"

        # Don't scale from 0 until GPU util > 10% (avoids noise)
        activationThreshold: "10"

      authenticationRef:
        name: azure-prom-auth

---
# --- ScaledObject: vLLM Queue Depth ---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inference-vllm-queue-scaler
  namespace: inference
spec:
  scaleTargetRef:
    name: workspace-phi4-mini

  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 4

  triggers:
    - type: prometheus
      metadata:
        serverAddress: "https://<AMW_ENDPOINT>.prometheus.monitor.azure.com"

        # vllm:num_requests_waiting = requests in the scheduler queue
        # This metric is natively exposed by vLLM at /metrics (no DCGM needed)
        query: |
          avg(
            vllm:num_requests_waiting{
              namespace="inference",
              pod=~"workspace-phi4-mini.*"
            }
          )
        metricName: vllm_queue_depth

        # Scale up when avg waiting requests > 5 per replica
        threshold: "5"
        activationThreshold: "1"

      authenticationRef:
        name: azure-prom-auth
