###############################################################################
# NVIDIA DCGM Exporter — DaemonSet
#
# WHAT IT DOES:
# DCGM (Data Center GPU Manager) is NVIDIA's management library. The exporter
# runs as a privileged DaemonSet on GPU nodes and exposes ~70 GPU metrics as
# Prometheus-compatible /metrics endpoint.
#
# KEY METRICS FOR LLM WORKLOADS:
#   DCGM_FI_DEV_GPU_UTIL      — GPU compute utilization (0-100%)
#   DCGM_FI_DEV_MEM_COPY_UTIL — Memory bus utilization (0-100%)
#   DCGM_FI_DEV_FB_USED       — Framebuffer (VRAM) used in MiB
#   DCGM_FI_DEV_FB_FREE       — Framebuffer free in MiB
#   DCGM_FI_DEV_POWER_USAGE   — GPU power draw in watts
#   DCGM_FI_DEV_SM_CLOCK      — SM (shader) clock in MHz
#   DCGM_FI_PROF_GR_ENGINE_ACTIVE — GR engine active fraction (0-1)
#
# HOW IT INTEGRATES WITH AZURE MANAGED PROMETHEUS:
# Azure Managed Prometheus auto-discovers pods with the annotation:
#   prometheus.io/scrape: "true"
# It scrapes this pod's /metrics every 30s and stores in your AMW.
# KEDA then queries AMW via the Prometheus query endpoint.
#
# NODE SELECTOR:
# The DaemonSet only runs on nodes labeled "accelerator=nvidia".
# NAP automatically adds this label to GPU nodes it provisions.
###############################################################################
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels:
    app: dcgm-exporter
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  template:
    metadata:
      labels:
        app: dcgm-exporter
      annotations:
        # Tell Azure Managed Prometheus to scrape this pod
        prometheus.io/scrape: "true"
        prometheus.io/port: "9400"
        prometheus.io/path: "/metrics"
    spec:
      # Only schedule on GPU nodes (NAP adds this label automatically)
      nodeSelector:
        accelerator: nvidia

      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule

      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
          ports:
            - name: metrics
              containerPort: 9400
              protocol: TCP
          env:
            # Metrics to collect — subset focused on LLM observability
            - name: DCGM_EXPORTER_COLLECTORS
              value: "/etc/dcgm-exporter/llm-metrics.csv"
          securityContext:
            runAsNonRoot: false
            privileged: true    # Required for GPU hardware access
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: pod-gpu-resources
              readOnly: true
              mountPath: /var/lib/kubelet/pod-resources

      volumes:
        - name: pod-gpu-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring

---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels:
    app: dcgm-exporter
spec:
  selector:
    app: dcgm-exporter
  ports:
    - name: metrics
      port: 9400
      targetPort: 9400
  type: ClusterIP
